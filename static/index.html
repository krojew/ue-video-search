<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE Video Search</title>
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #2f81f7;
    --accent-hover: #4a9eff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --ue-blue: #2f81f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
  }

  .logo svg { flex-shrink: 0; }

  .stats {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .stats span { white-space: nowrap; }
  .stat-value { color: var(--accent); font-weight: 600; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .tab {
    padding: 12px 20px;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Main ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Search ── */
  .search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .search-box input {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box input::placeholder { color: var(--text-dim); }

  .btn {
    padding: 10px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  /* ── Results ── */
  .results-info {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .video-header {
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .video-thumb {
    width: 160px;
    height: 90px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
  }

  .video-meta { flex: 1; min-width: 0; }

  .video-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .video-title a {
    color: var(--text);
    text-decoration: none;
  }

  .video-title a:hover { color: var(--accent); }

  .video-link {
    font-size: 12px;
    color: var(--text-dim);
    word-break: break-all;
  }

  .segment {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: background 0.1s;
  }

  .segment:last-child { border-bottom: none; }
  .segment:hover { background: var(--surface2); }

  .segment-time {
    flex-shrink: 0;
    width: 110px;
  }

  .segment-time a {
    display: inline-block;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    font-family: 'SF Mono', 'Fira Code', monospace;
    transition: all 0.15s;
  }

  .segment-time a:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .segment-body { flex: 1; min-width: 0; }

  .segment-score {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .score-bar {
    display: inline-block;
    height: 4px;
    border-radius: 2px;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
  }

  .segment-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── Ingest Panel ── */
  .ingest-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .ingest-status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }

  .ingest-phase {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .phase-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .phase-dot.active { background: var(--green); animation: pulse 1.5s infinite; }
  .phase-dot.done { background: var(--green); }
  .phase-dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .progress-bar-container {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    margin: 16px 0;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .ingest-details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .ingest-detail {
    text-align: center;
    padding: 10px;
    background: var(--surface2);
    border-radius: 6px;
  }

  .ingest-detail-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .ingest-detail-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ingest-message {
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-dim);
    word-break: break-word;
  }

  .ingest-log {
    margin-top: 20px;
    max-height: 240px;
    overflow-y: auto;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }

  .ingest-log div { padding: 2px 0; }
  .log-ok { color: var(--green); }
  .log-err { color: var(--red); }
  .log-info { color: var(--text-dim); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .video-header { flex-direction: column; }
    .video-thumb { width: 100%; height: auto; aspect-ratio: 16/9; }
    .segment { flex-direction: column; gap: 8px; }
    .segment-time { width: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    UE Video Search
  </div>
  <div class="stats" id="stats">
    <span>Indexed chunks: <span class="stat-value" id="stat-chunks">—</span></span>
    <span>Cached videos: <span class="stat-value" id="stat-videos">—</span></span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="search">Search</div>
  <div class="tab" data-tab="ingest">Ingest</div>
</div>

<main>
  <!-- ── Search Tab ── -->
  <div class="tab-content active" id="tab-search">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search video transcripts... e.g. &quot;nanite virtual geometry&quot;" autofocus>
      <button class="btn" id="search-btn">Search</button>
    </div>
    <div id="search-results">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <h3>Search Unreal Engine videos</h3>
        <p>Enter a topic to find relevant video segments with timestamps.</p>
      </div>
    </div>
  </div>

  <!-- ── Ingest Tab ── -->
  <div class="tab-content" id="tab-ingest">
    <div class="ingest-actions">
      <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
        <input type="checkbox" id="skip-uefn" checked>
        Skip UEFN/Fortnite videos
      </label>
      <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
        <input type="checkbox" id="skip-automotive" checked>
        Skip automotive videos
      </label>
      <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
        <input type="checkbox" id="skip-archvis" checked>
        Skip archvis videos
      </label>
      <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
        <input type="checkbox" id="include-streams" checked>
        Include live streams
      </label>
      <button class="btn" id="btn-ingest-full">Full Ingest</button>
      <button class="btn btn-secondary" id="btn-ingest-update">Update (new only)</button>
    </div>

    <div class="ingest-status-card">
      <div class="ingest-phase">
        <span class="phase-dot" id="phase-dot"></span>
        <span id="phase-label">Idle</span>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>

      <div class="ingest-details">
        <div class="ingest-detail">
          <div class="ingest-detail-value" id="detail-total">0</div>
          <div class="ingest-detail-label">Total</div>
        </div>
        <div class="ingest-detail">
          <div class="ingest-detail-value" id="detail-completed">0</div>
          <div class="ingest-detail-label">Completed</div>
        </div>
        <div class="ingest-detail">
          <div class="ingest-detail-value" id="detail-skipped">0</div>
          <div class="ingest-detail-label">Skipped</div>
        </div>
        <div class="ingest-detail">
          <div class="ingest-detail-value" id="detail-failed">0</div>
          <div class="ingest-detail-label">Failed</div>
        </div>
      </div>

      <div class="ingest-message" id="ingest-message"></div>

      <div class="ingest-log" id="ingest-log"></div>
    </div>
  </div>
</main>

<script>
(function() {
  // ── Tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Stats ──
  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      const d = await r.json();
      document.getElementById('stat-chunks').textContent = d.indexed_chunks.toLocaleString();
      document.getElementById('stat-videos').textContent = d.cached_videos.toLocaleString();
    } catch(e) {}
  }
  loadStats();

  // ── Search ──
  const searchInput = document.getElementById('search-input');
  const searchBtn = document.getElementById('search-btn');
  const resultsDiv = document.getElementById('search-results');

  async function doSearch() {
    const q = searchInput.value.trim();
    if (!q) return;

    searchBtn.disabled = true;
    searchBtn.innerHTML = '<span class="spinner"></span>Searching...';
    resultsDiv.innerHTML = '';

    try {
      const r = await fetch('/api/search?q=' + encodeURIComponent(q) + '&top_k=15');
      const data = await r.json();

      if (data.error) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <h3>Search failed</h3>
            <p>${escHtml(data.error)}</p>
          </div>`;
        return;
      }

      if (!data.videos || data.videos.length === 0) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <h3>No results found</h3>
            <p>Try different keywords or run an ingest first.</p>
          </div>`;
        return;
      }

      let html = `<div class="results-info">${data.total_results} matching segments across ${data.videos.length} video(s)</div>`;

      for (const video of data.videos) {
        const thumbUrl = `https://img.youtube.com/vi/${video.video_id}/mqdefault.jpg`;
        html += `<div class="video-card">
          <div class="video-header">
            <img class="video-thumb" src="${thumbUrl}" alt="" loading="lazy">
            <div class="video-meta">
              <div class="video-title"><a href="${video.video_url}" target="_blank" rel="noopener">${escHtml(video.video_title)}</a></div>
              <div class="video-link">${escHtml(video.video_url)}</div>
            </div>
          </div>`;

        for (const seg of video.segments) {
          const scorePct = (seg.score * 100).toFixed(1);
          const barWidth = Math.max(10, seg.score * 100);
          html += `<div class="segment">
            <div class="segment-time">
              <a href="${seg.timestamped_url}" target="_blank" rel="noopener">${escHtml(seg.time_range)}</a>
            </div>
            <div class="segment-body">
              <div class="segment-score">
                <span class="score-bar" style="width:${barWidth}px"></span>
                ${scorePct}% match
              </div>
              <div class="segment-text">${escHtml(seg.excerpt)}</div>
            </div>
          </div>`;
        }

        html += '</div>';
      }

      resultsDiv.innerHTML = html;
    } catch(e) {
      resultsDiv.innerHTML = `<div class="empty-state"><h3>Search failed</h3><p>Unable to connect to search service. Please try again later.</p></div>`;
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = 'Search';
    }
  }

  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── Ingest ──
  const btnFull = document.getElementById('btn-ingest-full');
  const btnUpdate = document.getElementById('btn-ingest-update');
  const phaseDot = document.getElementById('phase-dot');
  const phaseLabel = document.getElementById('phase-label');
  const progressBar = document.getElementById('progress-bar');
  const detailTotal = document.getElementById('detail-total');
  const detailCompleted = document.getElementById('detail-completed');
  const detailSkipped = document.getElementById('detail-skipped');
  const detailFailed = document.getElementById('detail-failed');
  const ingestMessage = document.getElementById('ingest-message');
  const ingestLog = document.getElementById('ingest-log');

  const phaseLabels = {
    idle: 'Idle',
    fetching: 'Fetching videos...',
    loading_model: 'Loading Whisper model...',
    processing: 'Processing videos...',
    done: 'Done',
    error: 'Error',
  };

  function updateIngestUI(data) {
    phaseLabel.textContent = phaseLabels[data.phase] || data.phase;

    phaseDot.className = 'phase-dot';
    if (data.phase === 'done') phaseDot.classList.add('done');
    else if (data.phase === 'error') phaseDot.classList.add('error');
    else if (data.phase !== 'idle') phaseDot.classList.add('active');

    detailTotal.textContent = data.total;
    detailCompleted.textContent = data.completed;
    detailSkipped.textContent = data.skipped;
    detailFailed.textContent = data.failed;

    const pct = data.total > 0 ? (data.completed / data.total * 100) : 0;
    progressBar.style.width = pct + '%';

    if (data.message) {
      ingestMessage.textContent = data.message;
      const div = document.createElement('div');
      div.className = data.phase === 'error' ? 'log-err' : (data.message.startsWith('Indexed') ? 'log-ok' : 'log-info');
      div.textContent = data.message;
      ingestLog.appendChild(div);
      ingestLog.scrollTop = ingestLog.scrollHeight;
    }

    const running = !['idle', 'done', 'error'].includes(data.phase);
    btnFull.disabled = running;
    btnUpdate.disabled = running;

    if (data.phase === 'done') loadStats();
  }

  // ── SSE stream management ──
  let activeEs = null;
  let reconnectTimer = null;

  function connectToIngestStream() {
    if (activeEs && activeEs.readyState !== EventSource.CLOSED) return;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

    const es = new EventSource('/api/ingest/stream');
    activeEs = es;

    es.addEventListener('status', e => {
      const data = JSON.parse(e.data);
      updateIngestUI(data);
      if (data.phase === 'done' || data.phase === 'error') {
        es.close();
        activeEs = null;
      }
    });

    es.addEventListener('ping', () => {});

    es.onerror = () => {
      es.close();
      activeEs = null;
      // Check if ingest is still running before reconnecting
      reconnectTimer = setTimeout(async () => {
        try {
          const r = await fetch('/api/ingest/status');
          const data = await r.json();
          updateIngestUI(data);
          if (!['idle', 'done', 'error'].includes(data.phase)) {
            connectToIngestStream();
          }
        } catch (_) {}
      }, 2000);
    };
  }

  async function checkAndReconnect() {
    try {
      const r = await fetch('/api/ingest/status');
      const data = await r.json();
      updateIngestUI(data);
      if (!['idle', 'done', 'error'].includes(data.phase)) {
        connectToIngestStream();
      }
    } catch (_) {}
  }

  async function startIngest(incremental) {
    ingestLog.innerHTML = '';
    ingestMessage.textContent = '';
    progressBar.style.width = '0%';

    const skipUefn = document.getElementById('skip-uefn').checked;
    const skipAutomotive = document.getElementById('skip-automotive').checked;
    const skipArchvis = document.getElementById('skip-archvis').checked;
    const includeStreams = document.getElementById('include-streams').checked;
    const url = '/api/ingest?incremental=' + incremental +
      '&skip_uefn=' + skipUefn +
      '&skip_automotive=' + skipAutomotive +
      '&skip_archvis=' + skipArchvis +
      '&include_streams=' + includeStreams;

    try {
      const r = await fetch(url, { method: 'POST' });
      const d = await r.json();

      if (!d.ok) {
        ingestMessage.textContent = d.message;
        phaseLabel.textContent = 'Error';
        phaseDot.classList.add('error');
        return;
      }
    } catch (e) {
      ingestMessage.textContent = 'Failed to start ingest: ' + e.message;
      phaseLabel.textContent = 'Error';
      phaseDot.classList.add('error');
      return;
    }

    connectToIngestStream();
  }

  btnFull.addEventListener('click', () => startIngest(false));
  btnUpdate.addEventListener('click', () => startIngest(true));

  // Reconnect when switching to the ingest tab
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.tab === 'ingest') checkAndReconnect();
    });
  });

  // Check on page load
  checkAndReconnect();

  // ── Helpers ──
  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
